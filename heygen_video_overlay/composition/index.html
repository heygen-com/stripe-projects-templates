<!doctype html>
<html
  lang="en"
  data-resolution="landscape"
  data-composition-variables='[
    { "id": "title", "type": "string", "label": "Title", "default": "Introducing Nova" },
    { "id": "tagline", "type": "string", "label": "Tagline", "default": "Built with HeyGen · provisioned via Stripe Projects" },
    { "id": "brandColor", "type": "color", "label": "Brand color", "default": "#6d4aff" },
    { "id": "introDurationMs", "type": "number", "label": "Intro ms", "default": 2500 },
    { "id": "bodyDurationMs", "type": "number", "label": "Body ms", "default": 10500 },
    { "id": "outroDurationMs", "type": "number", "label": "Outro ms", "default": 2500 },
    { "id": "speechStartMs", "type": "number", "label": "Speech start ms", "default": 2500 }
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0f0d18; }
      body { font-family: "Inter", system-ui, sans-serif; color: #fff; }
      #bg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
      /* soft grain/vignette over the shader for depth */
      #vignette { position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(70% 70% at 50% 45%, transparent 40%, rgba(0,0,0,0.45) 100%); }

      .layer { position: absolute; inset: 0; }

      /* Intro / outro centered text */
      #title { display: grid; place-items: center; padding: 0 12%; text-align: center; }
      #title .kicker { font-size: 26px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase;
        color: var(--brand); opacity: 0.95; margin-bottom: 22px; }
      /* texture-masked headline: text filled with a moving light→brand gradient (showcase technique) */
      #title h1 { font-size: 134px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.0; text-wrap: balance;
        background-image: linear-gradient(100deg, #ffffff 0%, color-mix(in srgb, var(--brand) 55%, #fff) 32%, #ffffff 58%, color-mix(in srgb, var(--brand) 72%, #fff) 100%);
        background-size: 220% 100%; -webkit-background-clip: text; background-clip: text;
        color: transparent; -webkit-text-fill-color: transparent; filter: drop-shadow(0 10px 50px rgba(0,0,0,0.4)); }
      /* film grain — tiny tiled noise, soft-light blended, above everything for a premium finish */
      #grain { position: absolute; inset: 0; pointer-events: none; z-index: 60; opacity: 0.13; mix-blend-mode: soft-light;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        background-size: 180px 180px; }

      /* Body: avatar in a glassy card on the right */
      #card { position: absolute; right: 6%; top: 160px; width: 620px; height: 760px;
        border-radius: 28px; overflow: hidden; background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.18);
        box-shadow: 0 40px 120px rgba(0,0,0,0.55), 0 0 0 8px rgba(255,255,255,0.03);
        backdrop-filter: blur(2px); }
      #card::after { content: ""; position: absolute; inset: 0; border-radius: 28px; pointer-events: none;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.3); }
      /* bias the crop to the top so the avatar's head is never cut off */
      #card video { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
      #ring { position: absolute; right: 6%; top: 160px; width: 620px; height: 760px;
        border-radius: 36px; pointer-events: none;
        background: linear-gradient(140deg, var(--brand), transparent 60%); filter: blur(38px); opacity: 0.5; z-index: -1; }

      /* Headline beside the card during the body */
      #headline { position: absolute; left: 8%; top: 30%; width: 42%; }
      #headline .eyebrow { font-size: 22px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--brand); margin-bottom: 16px; }
      #headline .h { font-size: 78px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.05; text-wrap: balance; }

      /* Captions */
      #captions { position: absolute; left: 8%; bottom: 9%; width: 46%; min-height: 1.2em; }
      #captions span { display: inline; font-size: 42px; font-weight: 700; line-height: 1.3;
        background: linear-gradient(transparent 62%, color-mix(in srgb, var(--brand) 65%, transparent) 0);
        box-decoration-break: clone; -webkit-box-decoration-break: clone; padding: 0 4px;
        text-shadow: 0 2px 16px rgba(0,0,0,0.55); }

      #outro { display: grid; place-items: center; gap: 26px; text-align: center; }
      #outro .orb { width: 92px; height: 92px; }
      #outro .tag { font-size: 46px; font-weight: 700; letter-spacing: -0.01em; text-wrap: balance; max-width: 60%; }
      #brandbar { position: absolute; left: 8%; bottom: 5.5%; font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.7); letter-spacing: 0.02em; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="25" data-width="1920" data-height="1080">
      <!-- WebGL shader background (deterministic, driven by the hf-seek time) -->
      <canvas id="bg" class="clip" data-start="0" data-duration="25" data-track-index="0" width="1920" height="1080"></canvas>
      <div id="vignette" class="clip" data-start="0" data-duration="25" data-track-index="1"></div>

      <!-- avatar media: opaque video shown muted in the card; same file is the audio track -->
      <div id="ring"></div>
      <div id="card"><video id="avatar-video" src="assets/avatar.webm" muted playsinline data-start="2.5" data-media-start="0" data-track-index="3"></video></div>
      <audio id="avatar-audio" src="assets/avatar.webm" data-start="2.5" data-track-index="4"></audio>

      <!-- visual layers (no data-*; opacity/transform owned by GSAP tweens, applied on seek) -->
      <div id="title" class="layer">
        <div>
          <div class="kicker" id="kicker">HeyGen × Stripe Projects</div>
          <h1 id="title-text">Introducing Nova</h1>
        </div>
      </div>
      <div id="headline"><div class="eyebrow">Now playing</div><div class="h" id="headline-text"></div></div>
      <div id="captions"><span id="cap-span"></span></div>
      <div id="outro" class="layer">
        <img class="orb" id="outro-orb" alt="" />
        <div class="tag" id="tagline-text"></div>
      </div>
      <div id="brandbar">heygen.com</div>
      <div id="grain"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const v = window.__hyperframes.getVariables();
      const sec = (ms) => (Number(ms) || 0) / 1000;
      const brand = v.brandColor || "#6d4aff";
      const intro = sec(v.introDurationMs);
      const speechStart = sec(v.speechStartMs);
      const body = sec(v.bodyDurationMs);
      const outroAt = speechStart + body; // outro begins right after speech, whatever its length
      document.documentElement.style.setProperty("--brand", brand);
      document.getElementById("title-text").textContent = v.title || "";
      document.getElementById("headline-text").textContent = v.title || "";
      document.getElementById("tagline-text").textContent = v.tagline || "";
      document.getElementById("outro-orb").src = "assets/heygen-orb.svg";

      // ---- WebGL shader background (flowing brand-tinted gradient) ----
      (function shader() {
        const c = document.getElementById("bg");
        const gl = c.getContext("webgl");
        if (!gl) return;
        const hex = brand.replace("#", "");
        const br = parseInt(hex.slice(0, 2), 16) / 255, bg = parseInt(hex.slice(2, 4), 16) / 255, bb = parseInt(hex.slice(4, 6), 16) / 255;
        const vs = "attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}";
        const fs =
          "precision highp float;uniform float t;uniform vec2 r;uniform vec3 c;" +
          "void main(){vec2 uv=gl_FragCoord.xy/r;float tt=t*0.16;" +
          "float w=sin(uv.x*3.0+tt)+sin(uv.y*4.0-tt*1.3)+sin((uv.x+uv.y)*5.0+tt*0.7);" +
          "float g=0.5+0.5*sin(w*0.9+tt);" +
          "vec3 col=mix(vec3(0.05,0.045,0.09),c,g*0.7);" +
          "col+=c*pow(g,3.0)*0.25;gl_FragColor=vec4(col,1.0);}";
        function sh(type, src) { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; }
        const prog = gl.createProgram();
        gl.attachShader(prog, sh(gl.VERTEX_SHADER, vs));
        gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fs));
        gl.linkProgram(prog); gl.useProgram(prog);
        const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
        const loc = gl.getAttribLocation(prog, "p"); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
        const uT = gl.getUniformLocation(prog, "t"), uR = gl.getUniformLocation(prog, "r"), uC = gl.getUniformLocation(prog, "c");
        window.__renderBg = (time) => {
          gl.viewport(0, 0, c.width, c.height);
          gl.uniform1f(uT, time); gl.uniform2f(uR, c.width, c.height); gl.uniform3f(uC, br, bg, bb);
          gl.drawArrays(gl.TRIANGLES, 0, 3);
        };
        window.__renderBg(0);
      })();

      // ---- Captions (phrase cues from HeyGen's SRT) ----
      const capSpan = document.getElementById("cap-span");
      let cues = [];
      fetch("assets/transcript.json").then((r) => r.json()).then((list) => {
        cues = (Array.isArray(list) ? list : []).map((x) => ({ start: speechStart + (x.start || 0), end: speechStart + (x.end || 0), text: x.text || "" }));
      });

      // ---- Entrance/exit tweens (GSAP tweens apply on seek, so they're render-safe) ----
      const tl = gsap.timeline({ paused: true });
      tl.set("#headline, #captions, #outro", { opacity: 0 });
      tl.from("#title .kicker", { opacity: 0, y: 24, duration: 0.6, ease: "power3.out" }, 0.15)
        .from("#title h1", { opacity: 0, y: 44, filter: "blur(18px)", duration: 0.8, ease: "power3.out" }, 0.3)
        .fromTo("#title h1", { backgroundPositionX: "100%" }, { backgroundPositionX: "0%", duration: 2.2, ease: "power2.out" }, 0.3)
        .to("#title", { opacity: 0, y: -30, duration: 0.5, ease: "power2.in" }, intro - 0.4)
        .fromTo("#ring, #card", { opacity: 0, x: 80 }, { opacity: 1, x: 0, duration: 0.7, ease: "power3.out" }, speechStart - 0.3)
        .to("#headline", { opacity: 1, duration: 0.5 }, speechStart)
        .from("#headline .eyebrow", { opacity: 0, x: -24, duration: 0.5 }, speechStart)
        .from("#headline .h", { opacity: 0, y: 30, filter: "blur(14px)", duration: 0.7, ease: "power3.out" }, speechStart + 0.1)
        .to("#captions", { opacity: 1, duration: 0.3 }, speechStart)
        .to("#headline, #card, #ring, #captions", { opacity: 0, duration: 0.5, ease: "power2.in" }, outroAt - 0.2)
        .to("#outro", { opacity: 1, duration: 0.6 }, outroAt)
        .from("#outro .orb", { scale: 0.7, opacity: 0, duration: 0.6, ease: "back.out(1.6)" }, outroAt + 0.05)
        .from("#outro .tag", { opacity: 0, y: 24, duration: 0.6 }, outroAt + 0.2);
      // a subtle continuous float on the card (seek-driven via the timeline)
      tl.to("#card, #ring", { y: "+=14", duration: 2.2, ease: "sine.inOut", repeat: 6, yoyo: true }, speechStart);
      window.__timelines["main"] = tl;

      // ---- Per-frame hook: shader time + active caption ----
      window.addEventListener("hf-seek", (e) => {
        const now = e.detail.time;
        if (window.__renderBg) window.__renderBg(now);
        const active = cues.find((c) => now >= c.start && now < c.end);
        capSpan.textContent = active ? active.text : "";
      });
    </script>
  </body>
</html>
