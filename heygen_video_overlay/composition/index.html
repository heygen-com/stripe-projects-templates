<!doctype html>
<html
  lang="en"
  data-resolution="landscape"
  data-composition-variables='[
    { "id": "title", "type": "string", "label": "Title", "default": "Introducing Nova" },
    { "id": "tagline", "type": "string", "label": "Tagline", "default": "Built with HeyGen · provisioned via Stripe Projects" },
    { "id": "brandColor", "type": "color", "label": "Brand color", "default": "#6d4aff" },
    { "id": "introDurationMs", "type": "number", "label": "Intro ms", "default": 2500 },
    { "id": "bodyDurationMs", "type": "number", "label": "Body ms", "default": 8000 },
    { "id": "outroDurationMs", "type": "number", "label": "Outro ms", "default": 2500 },
    { "id": "speechStartMs", "type": "number", "label": "Speech start ms", "default": 2500 }
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #15121f; }
      body { font-family: "Inter", system-ui, sans-serif; color: #fff; }
      #bg { position: absolute; inset: 0; background:
        radial-gradient(60% 80% at 18% 85%, color-mix(in srgb, var(--brand) 55%, transparent), transparent 70%),
        radial-gradient(55% 75% at 88% 12%, color-mix(in srgb, var(--brand) 40%, transparent), transparent 70%),
        radial-gradient(120% 120% at 78% 30%, #2a2440, #15121f); }
      .center { position: absolute; inset: 0; display: grid; place-items: center; padding: 0 9%; text-align: center; }
      #title-card .t { font-size: 110px; font-weight: 800; letter-spacing: -0.02em; text-wrap: balance; line-height: 1.05; }
      /* avatar cutout sits in the right third; video is muted, audio is a separate element */
      #avatar { position: absolute; right: 5%; bottom: 0; height: 90%; }
      #avatar video { height: 100%; width: auto; }
      #captions { position: absolute; left: 7%; bottom: 9%; max-width: 52%; font-size: 42px; font-weight: 700; line-height: 1.25; color: #fff; text-shadow: 0 2px 14px rgba(0,0,0,0.6); }
      #lower-third { position: absolute; left: 7%; bottom: 4%; font-size: 22px; font-weight: 600; color: var(--brand); }
      #outro .tag { font-size: 44px; font-weight: 700; color: #fff; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="13" data-width="1920" data-height="1080">
      <div id="bg" class="clip" data-start="0" data-duration="13" data-track-index="0"></div>

      <!-- Intro title card -->
      <div id="title-card" class="clip center" data-start="0" data-duration="2.5" data-track-index="1">
        <div class="t" id="title-text">Introducing Nova</div>
      </div>

      <!-- Body: avatar cutout (muted video) + separate audio + word-synced captions. The wrapper
           is non-timed so GSAP owns its entrance; the <video>/<audio> carry the timing + ids the
           renderer needs. Defaults here keep dev preview working; the pipeline overrides via vars. -->
      <div id="avatar">
        <video id="avatar-video" src="assets/avatar.webm" muted playsinline
               data-start="2.5" data-duration="8" data-media-start="0" data-track-index="2"></video>
      </div>
      <audio id="avatar-audio" src="assets/audio.webm" data-start="2.5" data-duration="8" data-track-index="3"></audio>
      <div id="captions" class="clip" data-start="2.5" data-duration="8" data-track-index="4"></div>
      <div id="lower-third" class="clip" data-start="2.5" data-duration="8" data-track-index="5"></div>

      <!-- Outro CTA -->
      <div id="outro" class="clip center" data-start="10.5" data-duration="2.5" data-track-index="1">
        <div class="tag" id="tagline-text">Built with HeyGen · provisioned via Stripe Projects</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const v = window.__hyperframes.getVariables();
      const sec = (ms) => (Number(ms) || 0) / 1000;
      const speechStart = sec(v.speechStartMs);

      // Brand + text from variables.
      document.documentElement.style.setProperty("--brand", v.brandColor || "#6d4aff");
      document.getElementById("title-text").textContent = v.title || "";
      document.getElementById("tagline-text").textContent = v.tagline || "";
      document.getElementById("lower-third").textContent = v.title || "";

      // Captions = HeyGen's SRT cues (phrase-level), imported to transcript.json as a list of
      // {text,start,end}. Cue times are relative to the speech media, so they render at
      // speechStart + cue.start (R7-NB-001). Show the active cue by playhead.
      const capEl = document.getElementById("captions");
      let cues = [];
      fetch("assets/transcript.json")
        .then((r) => r.json())
        .then((list) => {
          cues = (Array.isArray(list) ? list : []).map((c) => ({
            start: speechStart + (c.start || 0),
            end: speechStart + (c.end || 0),
            text: c.text || "",
          }));
        });

      const tl = gsap.timeline({ paused: true });
      tl.from("#title-card .t", { opacity: 0, y: -40, duration: 0.6, ease: "power3.out" }, 0.2);
      tl.from("#avatar", { opacity: 0, x: 60, duration: 0.5, ease: "power2.out" }, speechStart - 0.2);
      tl.from("#outro .tag", { opacity: 0, scale: 0.9, duration: 0.6, ease: "power2.out" }, 10.6);
      // Drive the active caption from the playhead (HyperFrames seeks this timeline per frame).
      tl.eventCallback("onUpdate", () => {
        const now = tl.time();
        const active = cues.find((c) => now >= c.start && now < c.end);
        capEl.textContent = active ? active.text : "";
      });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
