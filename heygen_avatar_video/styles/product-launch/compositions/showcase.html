<!-- showcase: browser/device frame doing a 3D reveal under a slow parallax-zoom.
     Built from ui-3d-reveal (3D card reveal) + app-showcase (device chrome) + parallax-zoom,
     reskinned to Studio Clean. Draws a browser window + mini app UI, or productImage if set. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b1220;
      }
    </style>
  </head>
  <body>
    <div
      id="showcase-root"
      data-composition-id="showcase"
      data-width="1920"
      data-height="1080"
      data-start="0"
      data-duration="11"
      data-composition-variables='[
        { "id": "title", "type": "string", "label": "Title", "default": "Meet HeyGen Studio" },
        { "id": "brandColor", "type": "color", "label": "Brand color", "default": "#2dd4bf" },
        { "id": "productImage", "type": "string", "label": "Product image", "default": "" }
      ]'
    >
      <!-- background wash + glow (Studio Clean) -->
      <div class="sc-glow" id="scGlow"></div>

      <!-- parallax-zoom grid: the device card is the focal element; a few faint -->
      <!-- accent chips sit around it and parallax outward as the focal scales. -->
      <div class="parallax-zoom-grid sc-stage" id="scStage">
        <!-- siblings: faint UI chips that drift outward -->
        <div class="parallax-zoom-card sc-chip sc-chip-a" data-pz-row="0" data-pz-col="0">
          <div class="chip-dot"></div>
          <span>render queue</span>
        </div>
        <div class="parallax-zoom-card sc-chip sc-chip-b" data-pz-row="0" data-pz-col="2">
          <div class="chip-dot"></div>
          <span>1080p · ready</span>
        </div>
        <div class="parallax-zoom-card sc-chip sc-chip-c" data-pz-row="2" data-pz-col="0">
          <div class="chip-dot"></div>
          <span>voice · auto</span>
        </div>

        <!-- focal: the 3D device card (browser window + app UI) -->
        <div
          class="parallax-zoom-card sc-card-wrap"
          data-pz-row="1"
          data-pz-col="1"
          data-pz-focus="true"
          id="scCardWrap"
        >
          <div class="sc-card-glow" id="scCardGlow"></div>
          <div class="sc-card" id="scCard">
            <!-- browser chrome -->
            <div class="sc-chrome">
              <div class="sc-lights">
                <span class="lt lt-r"></span>
                <span class="lt lt-y"></span>
                <span class="lt lt-g"></span>
              </div>
              <div class="sc-addr">
                <svg class="sc-lock" viewBox="0 0 16 16" width="14" height="14" fill="none">
                  <rect x="3.5" y="7" width="9" height="6.5" rx="1.4" stroke="#7c8aa0" stroke-width="1.4" />
                  <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="#7c8aa0" stroke-width="1.4" />
                </svg>
                <span class="sc-url">heygen.studio</span>
              </div>
              <div class="sc-chrome-actions">
                <span class="ca"></span><span class="ca"></span>
              </div>
            </div>

            <!-- app body: either a productImage or the drawn mini app UI -->
            <div class="sc-appbody" id="scAppBody">
              <!-- drawn product UI (default; hidden when productImage is set) -->
              <div class="sc-ui" id="scUI">
                <!-- header row -->
                <div class="sc-header">
                  <div class="sc-mark" id="scMark"></div>
                  <div class="sc-pname" id="scPName">HeyGen Studio</div>
                  <div class="sc-headspacer"></div>
                  <div class="sc-tab sc-tab-active">Create</div>
                  <div class="sc-tab">Library</div>
                  <div class="sc-acct"></div>
                </div>
                <!-- video stage -->
                <div class="sc-stage-area" id="scStageArea">
                  <div class="sc-play" id="scPlay">
                    <svg viewBox="0 0 80 80" width="80" height="80" fill="none">
                      <circle cx="40" cy="40" r="39" stroke="rgba(238,242,247,0.55)" stroke-width="2" />
                      <path d="M33 27 L57 40 L33 53 Z" fill="#eef2f7" />
                    </svg>
                  </div>
                  <div class="sc-timeline">
                    <div class="sc-tl-fill" id="scTlFill"></div>
                  </div>
                </div>
                <!-- two faint form rows -->
                <div class="sc-form">
                  <div class="sc-row" id="scRow1">
                    <span class="sc-row-lbl">Script</span>
                    <span class="sc-row-bar"></span>
                  </div>
                  <div class="sc-row" id="scRow2">
                    <span class="sc-row-lbl">Avatar</span>
                    <span class="sc-row-bar sc-row-bar-short"></span>
                  </div>
                </div>
              </div>
              <!-- productImage (shown only when the variable is non-empty) -->
              <img class="sc-prod-img" id="scProdImg" alt="" />
            </div>
          </div>
          <!-- right depth face — gives the card real thickness in 3D -->
          <div class="sc-depth" id="scDepth"></div>
        </div>
      </div>

      <style>
        #showcase-root {
          position: relative;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          font-family: "Inter", system-ui, sans-serif;
          background: #0b1220;
          color: #eef2f7;
        }
        #showcase-root .sc-glow {
          position: absolute;
          inset: 0;
          background:
            radial-gradient(620px 480px at 38% 46%, rgba(45, 212, 191, 0.12) 0%, rgba(11, 18, 32, 0) 65%),
            radial-gradient(520px 360px at 20% 80%, rgba(56, 189, 248, 0.08) 0%, rgba(11, 18, 32, 0) 60%);
          pointer-events: none;
        }

        /* stage fills the frame; parallax tuning lives on the .parallax-zoom-grid rule below */
        #showcase-root .sc-stage {
          position: absolute;
          inset: 0;
        }

        /* the device sits on the LEFT ~62% — right ~30% is reserved for the avatar */
        #showcase-root .sc-card-wrap {
          position: absolute;
          left: 150px;
          top: 196px;
          width: 980px;
          height: 640px;
          transform-style: preserve-3d;
          perspective: 2600px;
        }
        #showcase-root .sc-card-glow {
          position: absolute;
          inset: -40px -20px -60px -20px;
          border-radius: 28px;
          background: radial-gradient(ellipse at 46% 44%, rgba(45, 212, 191, 0.22) 0%, rgba(11, 18, 32, 0) 66%);
          filter: blur(34px);
          opacity: 0;
          pointer-events: none;
          z-index: -1;
        }
        #showcase-root .sc-card {
          width: 980px;
          height: 640px;
          border-radius: 18px;
          overflow: hidden;
          background: #0e1729;
          border: 1px solid rgba(238, 242, 247, 0.1);
          box-shadow:
            0 50px 130px rgba(0, 0, 0, 0.6),
            inset 0 1px 0 rgba(238, 242, 247, 0.08);
          transform-origin: center center;
        }
        #showcase-root .sc-depth {
          position: absolute;
          top: 10px;
          left: 980px;
          width: 12px;
          height: 620px;
          transform-origin: 0% 50%;
          transform: rotateY(90deg);
          background: linear-gradient(to right, rgba(45, 212, 191, 0.4) 0%, rgba(14, 23, 41, 0.95) 100%);
          border-radius: 3px;
        }

        /* browser chrome */
        #showcase-root .sc-chrome {
          height: 62px;
          background: #0b1322;
          border-bottom: 1px solid rgba(238, 242, 247, 0.08);
          display: flex;
          align-items: center;
          padding: 0 22px;
          gap: 18px;
        }
        #showcase-root .sc-lights {
          display: flex;
          gap: 10px;
          flex-shrink: 0;
        }
        #showcase-root .lt {
          width: 14px;
          height: 14px;
          border-radius: 50%;
          display: block;
        }
        #showcase-root .lt-r {
          background: #ff5f57;
        }
        #showcase-root .lt-y {
          background: #febc2e;
        }
        #showcase-root .lt-g {
          background: #28c840;
        }
        #showcase-root .sc-addr {
          flex: 1;
          height: 36px;
          background: #0e1729;
          border: 1px solid rgba(238, 242, 247, 0.1);
          border-radius: 9px;
          display: flex;
          align-items: center;
          gap: 9px;
          padding: 0 16px;
        }
        #showcase-root .sc-url {
          font-size: 20px;
          font-weight: 500;
          color: #c3ccda;
          letter-spacing: 0.01em;
        }
        #showcase-root .sc-chrome-actions {
          display: flex;
          gap: 8px;
          flex-shrink: 0;
        }
        #showcase-root .ca {
          width: 22px;
          height: 6px;
          border-radius: 3px;
          background: rgba(238, 242, 247, 0.16);
          display: block;
        }

        /* app body */
        #showcase-root .sc-appbody {
          position: relative;
          width: 100%;
          height: 578px;
          background: #0e1729;
        }
        #showcase-root .sc-ui {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          padding: 26px 30px 30px;
          gap: 20px;
        }
        #showcase-root .sc-prod-img {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: none;
        }

        /* header row */
        #showcase-root .sc-header {
          display: flex;
          align-items: center;
          gap: 16px;
        }
        #showcase-root .sc-mark {
          width: 36px;
          height: 36px;
          border-radius: 10px;
          background: linear-gradient(135deg, #2dd4bf, #38bdf8);
          flex-shrink: 0;
          box-shadow: 0 6px 20px rgba(45, 212, 191, 0.35);
        }
        #showcase-root .sc-pname {
          font-size: 26px;
          font-weight: 700;
          color: #eef2f7;
          letter-spacing: -0.01em;
        }
        #showcase-root .sc-headspacer {
          flex: 1;
        }
        #showcase-root .sc-tab {
          font-size: 18px;
          font-weight: 600;
          color: #8593a8;
          padding: 8px 16px;
          border-radius: 9px;
        }
        #showcase-root .sc-tab-active {
          color: #0b1220;
          background: #2dd4bf;
        }
        #showcase-root .sc-acct {
          width: 36px;
          height: 36px;
          border-radius: 50%;
          background: linear-gradient(135deg, #38bdf8, #2dd4bf);
          flex-shrink: 0;
        }

        /* video stage */
        #showcase-root .sc-stage-area {
          position: relative;
          flex: 1;
          border-radius: 14px;
          background:
            radial-gradient(120% 140% at 50% 0%, #16233c 0%, #0a1120 70%);
          border: 1px solid rgba(238, 242, 247, 0.08);
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
        }
        #showcase-root .sc-play {
          opacity: 0.95;
        }
        #showcase-root .sc-timeline {
          position: absolute;
          left: 28px;
          right: 28px;
          bottom: 26px;
          height: 8px;
          border-radius: 4px;
          background: rgba(238, 242, 247, 0.12);
          overflow: hidden;
        }
        #showcase-root .sc-tl-fill {
          width: 0%;
          height: 100%;
          border-radius: 4px;
          background: linear-gradient(90deg, #2dd4bf, #38bdf8);
        }

        /* two faint form rows */
        #showcase-root .sc-form {
          display: flex;
          flex-direction: column;
          gap: 14px;
        }
        #showcase-root .sc-row {
          display: flex;
          align-items: center;
          gap: 18px;
          opacity: 0.55;
        }
        #showcase-root .sc-row-lbl {
          width: 110px;
          font-size: 18px;
          font-weight: 600;
          color: #8593a8;
          flex-shrink: 0;
        }
        #showcase-root .sc-row-bar {
          flex: 1;
          height: 16px;
          border-radius: 8px;
          background: rgba(238, 242, 247, 0.12);
        }
        #showcase-root .sc-row-bar-short {
          max-width: 44%;
        }

        /* faint floating chips (parallax siblings) */
        #showcase-root .sc-chip {
          position: absolute;
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 12px 18px;
          border-radius: 12px;
          background: rgba(14, 23, 41, 0.72);
          border: 1px solid rgba(45, 212, 191, 0.28);
          font-size: 18px;
          font-weight: 600;
          color: #c3ccda;
          box-shadow: 0 18px 50px rgba(0, 0, 0, 0.4);
          white-space: nowrap;
        }
        #showcase-root .chip-dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
          background: #2dd4bf;
          box-shadow: 0 0 12px rgba(45, 212, 191, 0.8);
        }
        /* chips live in the negative space AROUND the device card (left:150 top:196
           w:980 h:640 → right edge 1130, bottom 836), not over it. */
        #showcase-root .sc-chip-a {
          left: 40px;
          top: 96px;
        }
        #showcase-root .sc-chip-b {
          left: 1146px;
          top: 150px;
        }
        #showcase-root .sc-chip-c {
          left: 40px;
          top: 884px;
        }
      </style>

      <!-- parallax-zoom component snippet (drives .parallax-zoom-card transforms from --pz-progress) -->
      <style>
        #showcase-root .parallax-zoom-grid {
          --pz-progress: 0;
          /* Studio Clean tuning (overrides the component defaults): a gentle focal
             push so the device grows just slightly into frame while the avatar holds
             the right side; siblings drift a little and fully fade so nothing readable
             leaves the canvas. */
          --pz-focus-scale: 1.1;
          --pz-sibling-push: 90px;
          --pz-sibling-fade: 1;
          position: relative;
        }
        #showcase-root .parallax-zoom-card {
          transform-origin: center center;
          will-change: transform, opacity;
          transform: translate3d(
              calc(var(--pz-dx, 0px) * var(--pz-progress)),
              calc(var(--pz-dy, 0px) * var(--pz-progress)),
              0
            )
            scale(calc(1 - var(--pz-progress) * 0.4));
          opacity: calc(1 - var(--pz-progress) * var(--pz-sibling-fade));
        }
        #showcase-root .parallax-zoom-card[data-pz-focus="true"] {
          z-index: 10;
          transform: translate3d(0, 0, 0)
            scale(calc(1 + var(--pz-progress) * (var(--pz-focus-scale) - 1)));
          opacity: 1;
        }
      </style>

      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          var S = '#showcase-root ';
          var hf = window.__hyperframes;
          var v = hf && hf.getVariables ? hf.getVariables() : {};
          var brand = v.brandColor || "#2dd4bf";
          var productImage = (v.productImage || "").trim();

          // brand accents (literal values; only a few brand-tinted surfaces)
          document.querySelectorAll(S + ".chip-dot").forEach(function (e) {
            e.style.background = brand;
          });
          var pname = document.getElementById("scPName");
          if (pname && v.title) pname.textContent = v.title;

          // productImage swap: image replaces the drawn UI when provided
          var prod = document.getElementById("scProdImg");
          var ui = document.getElementById("scUI");
          if (productImage && prod && ui) {
            prod.src = productImage;
            prod.style.display = "block";
            ui.style.display = "none";
          }

          // ---- parallax-zoom sibling offset computation (from the component) ----
          var grid = document.querySelector(S + ".parallax-zoom-grid");
          if (grid) {
            var cards = Array.prototype.slice.call(grid.querySelectorAll(".parallax-zoom-card"));
            var focal = cards.filter(function (c) {
              return c.dataset.pzFocus === "true";
            })[0];
            if (focal) {
              var focusRow = Number(focal.dataset.pzRow || 0);
              var focusCol = Number(focal.dataset.pzCol || 0);
              var push = parseFloat(getComputedStyle(grid).getPropertyValue("--pz-sibling-push")) || 900;
              cards.forEach(function (card) {
                if (card === focal) return;
                var row = Number(card.dataset.pzRow || 0);
                var col = Number(card.dataset.pzCol || 0);
                var dCol = col - focusCol;
                var dRow = row - focusRow;
                var mag = Math.hypot(dCol, dRow) || 1;
                card.style.setProperty("--pz-dx", (dCol / mag) * push * mag + "px");
                card.style.setProperty("--pz-dy", (dRow / mag) * push * mag + "px");
              });
            }
          }

          var tl = gsap.timeline({ paused: true });

          // ── BUILD (0–2s): the 3D reveal of the device card ──
          // card glow blooms
          tl.fromTo(S + ".sc-card-glow", { opacity: 0 }, { opacity: 1, duration: 0.9, ease: "power1.out", overwrite: "auto" }, 0.15);
          // device flips up from a tilted-back 3D pose into flat (ui-3d-reveal technique)
          tl.fromTo(
            S + ".sc-card",
            { rotationX: 16, rotationY: -22, y: 70, opacity: 0, transformPerspective: 2600 },
            { rotationX: 0, rotationY: 0, y: 0, opacity: 1, duration: 1.1, ease: "expo.out", overwrite: "auto" },
            0.2,
          );
          tl.fromTo(
            S + ".sc-depth",
            { opacity: 0 },
            { opacity: 1, duration: 0.8, ease: "power2.out", overwrite: "auto" },
            0.5,
          );
          // chrome lights pop, then address bar wipes in
          tl.fromTo(
            S + ".lt",
            { scale: 0, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(2)", stagger: 0.07, overwrite: "auto" },
            0.9,
          );
          tl.fromTo(
            S + ".sc-addr",
            { opacity: 0, x: -16 },
            { opacity: 1, x: 0, duration: 0.5, ease: "power2.out", overwrite: "auto" },
            1.05,
          );

          // ── BREATHE (2–8s): app UI reveals inside the frame ──
          // header
          tl.fromTo(
            S + ".sc-mark",
            { opacity: 0, scale: 0.6, rotation: -20 },
            { opacity: 1, scale: 1, rotation: 0, duration: 0.6, ease: "back.out(1.7)", overwrite: "auto" },
            1.7,
          );
          tl.fromTo(
            S + ".sc-pname",
            { opacity: 0, x: -22 },
            { opacity: 1, x: 0, duration: 0.55, ease: "power3.out", overwrite: "auto" },
            1.85,
          );
          tl.fromTo(
            S + ".sc-tab, " + S + ".sc-acct",
            { opacity: 0, y: -14 },
            { opacity: 1, y: 0, duration: 0.5, ease: "power2.out", stagger: 0.08, overwrite: "auto" },
            2.0,
          );
          // video stage scales in
          tl.fromTo(
            S + ".sc-stage-area",
            { opacity: 0, scale: 0.94 },
            { opacity: 1, scale: 1, duration: 0.7, ease: "power3.out", overwrite: "auto" },
            2.2,
          );
          // play glyph pops
          tl.fromTo(
            S + ".sc-play",
            { opacity: 0, scale: 0.5 },
            { opacity: 0.95, scale: 1, duration: 0.6, ease: "back.out(2.2)", overwrite: "auto" },
            2.7,
          );
          // form rows slide up (only when drawing the UI)
          if (!productImage) {
            tl.fromTo(
              S + ".sc-row",
              { opacity: 0, y: 18 },
              { opacity: 0.55, y: 0, duration: 0.5, ease: "power2.out", stagger: 0.12, overwrite: "auto" },
              3.1,
            );
          }
          // timeline fills across the breathe phase (progress feel)
          tl.fromTo(
            S + ".sc-tl-fill",
            { width: "0%" },
            { width: "72%", duration: 3.6, ease: "power1.inOut" },
            3.0,
          );

          // ── slow parallax-zoom across the whole body (the "slow parallax-zoom") ──
          // drives --pz-progress so the device grows while chips drift outward+fade.
          tl.fromTo(
            S + ".parallax-zoom-grid",
            { "--pz-progress": 0 },
            { "--pz-progress": 1, duration: 8.0, ease: "sine.inOut" },
            1.4,
          );

          window.__timelines["showcase"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
